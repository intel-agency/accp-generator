# OpenRouter — free models via multi-provider gateway
name: OpenRouter
id: openrouter
description: >-
  OpenRouter aggregates models from many upstream providers behind a single
  OpenAI-compatible API. Free-tier models (model ID ending in :free) available
  with rate limits of 20 req/min and 200 req/day.
website: https://openrouter.ai
access_type: free-tier
api_key_var: OPENROUTER_API_KEY

endpoints:
  - base_url: https://openrouter.ai/api/v1
    compatibility: openai
    models:
      # Best free coding models
      - id: mistralai/devstral-2:free
        display_name: Devstral 2 (Mistral)
        max_output_tokens: 32768
        image_support: false

      - id: qwen/qwen3-coder-480b:free
        display_name: Qwen3 Coder 480B
        max_output_tokens: 32768
        image_support: false

      - id: deepseek/deepseek-r1:free
        display_name: DeepSeek R1
        max_output_tokens: 32768
        image_support: false

      # Best free general models
      - id: google/gemini-2.0-flash-exp:free
        display_name: Gemini 2.0 Flash Exp
        max_output_tokens: 8192
        image_support: true

      - id: meta-llama/llama-3.3-70b-instruct:free
        display_name: Llama 3.3 70B
        max_output_tokens: 32768
        image_support: false

      - id: mistralai/mistral-small-3.1-24b-instruct:free
        display_name: Mistral Small 3.1 24B
        max_output_tokens: 32768
        image_support: true

      - id: qwen/qwen-2.5-72b-instruct:free
        display_name: Qwen 2.5 72B
        max_output_tokens: 32768
        image_support: false

      - id: google/gemma-3-27b-it:free
        display_name: Gemma 3 27B
        max_output_tokens: 8192
        image_support: true

      - id: nousresearch/deephermes-3-llama-3-8b-preview:free
        display_name: DeepHermes 3 Llama 8B
        max_output_tokens: 16384
        image_support: false
